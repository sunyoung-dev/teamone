name: Render Keep Alive

on:
  schedule:
    # 10분마다 실행 (분 시 일 월 요일)
    - cron: '*/10 * * * *'
  workflow_dispatch: # 수동으로 실행 버튼 활성화

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Ping to Render
        run: |
          curl -s https://teamone.onrender.com/ > /dev/null
          echo "Ping sent at $(date)"
